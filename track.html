<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track - Courier Tracking</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://png.pngtree.com/thumb_back/fh260/background/20230715/pngtree-d-render-of-location-pin-and-online-shopping-cart-for-easy-image_3881652.jpg') center/cover no-repeat;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-size: cover;
    }

    .navbar {
      background-color: #dc3545;
    }

    .express-logo {
      font-family: 'Pacifico', cursive;
      font-size: 28px;
      color: white ;
    }

    .nav-link {
      color: white;
    }

    .container {
      max-width: 1000px;
      margin:  auto;
      flex: 1;
    }

    .container-box {
      max-width: 800px;
      margin: 30px ;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      color: #000;
    }

    .form-control {
      border-radius: 5px;
      box-shadow: none;
      border: 1px solid #ddd;
    }

    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 0 0.2rem rgba(38, 143, 255, 0.25);
    }

    .btn-danger {
      background-color: #dc3545;
      border-color: #dc3545;
    }

    .btn-danger:hover {
      background-color: #c82333;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .map-container {
      height: 400px;
      width: 100%;
      border-radius: 8px;
      margin-top: 20px;
    }

    .progress-container {
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background-color: #dc3545;
      color: #fff;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand express-logo text-white fw-bold" href="index.html">ExpressLogix</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="track.html">Track</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container">
    <div class="container-box">
      <h4 class="text-center mb-4">Enter Tracking Number</h4>
      <input type="text" id="trackingNumber" class="form-control" placeholder="Tracking Number">
      <button class="btn btn-danger mt-3 w-100" onclick="trackParcel()">Track</button>
      <div class="loader" id="loader" style="display:none;"></div>

      <!-- Map -->
      <div id="map" class="map-container" style="display:none;"></div>

      <!-- Progress & ETA -->
      <div class="progress-container" id="progressSection" style="display:none;">
        <h5 class="mt-4 text-dark fw-bold">Tracking Progress</h5>
        <label class="form-label mt-3">Parcel Progress:</label>
        <div class="progress">
          <div id="progressBar" class="progress-bar bg-success" style="width: 0%;">0%</div>
        </div>
        <p class="mt-2 text-dark"><strong>Estimated Time Remaining:</strong> <span id="eta">Calculating...</span></p>
        <p class="mt-2 text-dark"><strong>Status:</strong> <span id="statusText">Waiting...</span></p>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 ExpressLogix. All rights reserved.</p>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>

  <script>
    function trackParcel() {
      const trackingNumber = document.getElementById("trackingNumber").value.trim();
      const loader = document.getElementById("loader");
      const mapContainer = document.getElementById("map");
      const progressSection = document.getElementById("progressSection");
      const progressBar = document.getElementById("progressBar");
      const eta = document.getElementById("eta");
      const statusText = document.getElementById("statusText");

      if (!trackingNumber) {
        alert("Please enter a tracking number.");
        return;
      }

      loader.style.display = "block";

      fetch(`track_api.php?tracking_number=${trackingNumber}`)
        .then(response => response.json())
        .then(data => {
          loader.style.display = "none";

          if (data.error) {
            alert(data.error);
            return;
          }

          // Show map and progress
          mapContainer.style.display = "block";
          progressSection.style.display = "block";

          const origin = L.latLng(data.origin_lat, data.origin_lng);
          const destination = L.latLng(data.dest_lat, data.dest_lng);

          const map = L.map("map").setView(origin, 9);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap contributors"
          }).addTo(map);

          L.marker(origin).addTo(map).bindPopup("Origin: " + data.origin_name).openPopup();
          L.marker(destination).addTo(map).bindPopup("Destination: " + data.destination_name);

          const routingControl = L.Routing.control({
            waypoints: [origin, destination],
            lineOptions: { styles: [{ color: "green", weight: 5 }] },
            addWaypoints: false,
            draggableWaypoints: false,
            routeWhileDragging: false,
            createMarker: () => null,
            show: false
          }).addTo(map);

          routingControl.on('routesfound', function(e) {
            const coords = e.routes[0].coordinates;
            const index = Math.floor((data.progress / 100) * coords.length);
            const currentLatLng = coords[index];

            L.marker(currentLatLng, {
              icon: L.icon({
                iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
                iconSize: [32, 32],
                iconAnchor: [16, 32]
              })
            }).addTo(map).bindPopup("Current Parcel Location").openPopup();
          });

          // Update Progress & Status
          progressBar.style.width = data.progress + "%";
          progressBar.innerText = data.progress + "%";
          eta.innerText = data.eta;
          statusText.innerText = data.status;
        })
        .catch(error => {
          loader.style.display = "none";
          alert("Failed to fetch tracking data. Please try again later.");
          console.error(error);
        });
    }
  </script>
</body>
</html>
