  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: url('https://png.pngtree.com/thumb_back/fh260/background/20230715/pngtree-d-render-of-location-pin-and-online-shopping-cart-for-easy-image_3881652.jpg') center/cover no-repeat;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-size: cover;
    }

    .navbar {
      background-color: #dc3545;
    }

    .navbar-brand img {
      height: 40px;
    }

    .nav-link {
      color: white;
    }
    .express-logo {
      font-family: 'Pacifico', cursive;
      font-size: 28px;
      color: white !important;
    }

    .container-box {
      max-width: 800px;
      margin: 60px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

    h4 {

      font-weight: 600;
      color: #dc3545;

    .form-control {
      border-radius: 8px;
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .form-control:focus {
      border-color: #dc3545;
      box-shadow: 0 0 5px rgba(220, 53, 69, 0.5);
    }

    .btn-danger {
      background-color: #dc3545;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      font-weight: 500;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    .btn-danger:hover {
      background-color: #c82333;
    }

    footer {
      background-color: #dc3545;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: auto;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 0;
      border-radius: 12px;
      margin-top: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .contact-info p {
      font-size: 16px;
      font-weight: 500;
      margin: 8px 0;
    }

    .contact-info strong {
      color: #dc3545;
    }

    .form-group {
      margin-bottom: 15px;
    }

    @media (max-width: 768px) {
      .container-box {
        padding: 20px;
      }
    }

  <div class="container-box">
    <h4>Contact Us</h4>

    <div class="contact-info">
      <p><strong>Email:</strong> expresslogix@courier.com</p>
      <p><strong>Phone:</strong> +123 456 7890</p>
      <p><strong>Address:</strong> 123 Courier Street, City, Country</p>
      <p><strong>Customer Support Hours:</strong> Mon-Sat, 9:00 AM - 6:00 PM</p>
    </div>

    
    <form action="submit_contact.php" method="POST">
      <div class="form-group">
        <input type="text" name="name" class="form-control" placeholder="Your Name" required />
      </div>
      <div class="form-group">
        <input type="email" name="email" class="form-control" placeholder="Your Email" required />
      </div>
      <div class="form-group">
        <input type="text" name="subject" class="form-control" placeholder="Subject" required />
      </div>
      <div class="form-group">
        <textarea name="message" class="form-control" rows="4" placeholder="Your Message" required></textarea>
      </div>
      <button type="submit" class="btn btn-danger">Send Message</button>
    </form>

    
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.019874829011!2d-122.41941558468115!3d37.77492977975952!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808cd28df0c1%3A0x44d948da67e50f41!2sCourier%20Company!5e0!3m2!1sen!2s!4v1616171051610!5m2!1sen!2s"

    </iframe>
